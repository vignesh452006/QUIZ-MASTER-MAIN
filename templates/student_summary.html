<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Summary - Quiz Master</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #0f2027;
            --panel-bg: #ffffff;
            --accent: #2c5364;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            color: #fff;
        }

        /* --- NAVIGATION STRUCTURE --- */
        .navbar-custom {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
        }

        .nav-link-custom {
            color: #fff;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- DASHBOARD LAYOUT --- */
        .main-wrapper {
            display: flex;
            padding: 40px;
            gap: 30px;
        }

        .side-info {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            height: fit-content;
        }

        .chart-container {
            flex: 2;
            background: var(--panel-bg);
            color: #000;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .status-pill {
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .bg-attempted { background: rgba(40, 167, 69, 0.1); color: #28a745; border: 1px solid #28a745; }
        .bg-pending { background: rgba(220, 53, 69, 0.1); color: #dc3545; border: 1px solid #dc3545; }

        .btn-back {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            transition: 0.3s;
        }

        .btn-back:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>

<nav class="navbar-custom d-flex justify-content-between align-items-center">
    <div>
        <a href="{{ url_for('student_dashboard') }}" class="nav-link-custom">🏠 HOME</a>
        <span class="text-white-50">| SYSTEM_SUMMARY</span>
    </div>
    <div>
        <span class="me-3 text-white-50">LOGGED_IN AS:</span>
        <strong class="text-info">{{ username }}</strong>
    </div>
</nav>

<div class="container py-5">
    
    <div class="main-wrapper">
        
        <div class="side-info">
            <h4 class="mb-4">USER_PROFILE</h4>
            <div class="mb-4">
                <small class="text-white-50 d-block">IDENTITY</small>
                <h5>{{ username }}</h5>
            </div>
            
            <hr class="opacity-25">

            <div class="status-pill bg-attempted">
                <span>Attempted</span>
                <span>{{ attempted or 0 }}</span>
            </div>
            <div class="status-pill bg-pending">
                <span>Remaining</span>
                <span>{{ not_attempted or 0 }}</span>
            </div>

            <div class="mt-5">
                <a href="{{ url_for('student_dashboard') }}" class="btn btn-back w-100">⬅ EXIT TO DASHBOARD</a>
            </div>
        </div>

        <div class="chart-container text-center"
             id="summaryData"
             data-attempted="{{ attempted or 0 }}"
             data-notattempted="{{ not_attempted or 0 }}">
            
            <h3 class="mb-4">Performance Analytics</h3>
            <div style="max-width: 400px; margin: auto;">
                <canvas id="summaryChart" height="400"></canvas>
            </div>
            <p class="mt-4 text-muted small">Visual representation of your quiz engagement metrics.</p>
        </div>

    </div>

</div>

<script>
    const box = document.getElementById("summaryData");

    const attempted = parseInt(box.dataset.attempted) || 0;
    const notAttempted = parseInt(box.dataset.notattempted) || 0;

    const ctx = document.getElementById('summaryChart').getContext('2d');

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Attempted', 'Not Attempted'],
            datasets: [{
                data: [attempted, notAttempted],
                backgroundColor: ['#28a745', '#dc3545'],
                hoverOffset: 15,
                borderWidth: 5,
                borderColor: '#ffffff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        font: { size: 14, family: 'Rajdhani' },
                        padding: 20
                    }
                }
            }
        }
    });
</script>

</body>
</html>
