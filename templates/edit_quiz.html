<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modify Module | Staff Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        body { background: #020205; color: white; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0,255,204,0.3); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; margin: auto; }
        .form-control { background: #000; border: 1px solid #333; color: #00ffcc; padding: 12px; }
        .form-control:focus { background: #050505; border-color: #00ffcc; color: #fff; box-shadow: 0 0 10px rgba(0,255,204,0.2); }
        .btn-update { background: #00ffcc; color: #000; font-weight: 800; border: none; letter-spacing: 2px; }
    </style>
</head>
<body>
<div class="container">
    <div class="glass-card">
        <h3 class="mb-4 text-center text-info" style="letter-spacing: 3px;">RECONFIGURE_MODULE</h3>
        <form method="post">
            <div class="mb-3">
                <label class="small text-white-50">SECTOR (SUBJECT)</label>
                <input type="text" name="subject" class="form-control" value="{{ quiz.subject }}" required>
            </div>
            <div class="mb-4">
                <label class="small text-white-50">MODULE_ID (CHAPTER)</label>
                <input type="text" name="chapter" class="form-control" value="{{ quiz.chapter }}" required>
            </div>
            <button type="submit" class="btn btn-update w-100 mb-3">APPLY_CHANGES</button>
            <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary w-100 btn-sm">← ABORT_RECODE</a>
        </form>
    </div>
</div>
</body>
</html>
