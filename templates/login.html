<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticate | Quiz Master</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-main: #00ffcc;
            --neon-alt: #00ccff;
            --dark-core: #020205;
            --error-red: #ff2d55;
        }

        body, html {
            height: 100%; margin: 0;
            background-color: var(--dark-core);
            font-family: 'Orbitron', sans-serif;
            color: white; overflow: hidden;
        }

        .void-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a2e 0%, #020205 100%);
            z-index: -1;
        }

        .hex-grid {
            position: absolute; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTMwIDBMMDYwIDE1VjQ1TDMwIDYwTDAgNDVWMTVMzMCAweiIgc3Ryb2tlPSJyZ2JhKDAsIDI1NSwgMjA0LCAwLjA1KSIgZmlsbD0ibm9uZSIvPjwvc3ZnPg==');
            animation: move-bg 60s linear infinite; opacity: 0.4;
        }

        @keyframes move-bg { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .glitch-header {
            font-family: 'Syncopate', sans-serif; font-weight: 700;
            color: var(--neon-main); text-shadow: 0 0 10px var(--neon-main);
            letter-spacing: 5px; animation: glitch 3s infinite alternate;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg); text-shadow: 2px 2px var(--neon-main); }
            20% { transform: skew(2deg); text-shadow: -2px -2px var(--neon-alt); }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 50px;
            width: 100%; max-width: 450px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .form-label { font-size: 0.75rem; letter-spacing: 2px; color: var(--neon-alt); text-transform: uppercase; }

        .form-control {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 255, 204, 0.2);
            color: white; border-radius: 5px; padding: 12px; font-family: monospace;
        }

        .form-control:focus {
            background: rgba(0, 0, 0, 0.6); border-color: var(--neon-main);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); color: var(--neon-main); outline: none;
        }

        .btn-plasma {
            width: 100%; padding: 15px; margin-top: 20px;
            background: transparent; border: 2px solid var(--neon-main);
            color: var(--neon-main); font-weight: 700; text-transform: uppercase;
            letter-spacing: 3px; transition: 0.4s;
        }

        .btn-plasma:hover {
            background: var(--neon-main); color: #000;
            box-shadow: 0 0 40px var(--neon-main); transform: scale(1.02);
        }

        .back-link { text-decoration: none; color: rgba(255,255,255,0.4); font-size: 0.8rem; letter-spacing: 1px; }
        .back-link:hover { color: var(--neon-alt); }

        .alert-neon {
            background: rgba(255, 45, 85, 0.1); border: 1px solid var(--error-red);
            color: var(--error-red); font-size: 0.8rem; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="void-bg"><div class="hex-grid"></div></div>

<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    
    {% if error %}
        <div class="alert alert-neon w-100 mb-4 text-center" style="max-width: 450px;">
            SYSTEM_ERROR: {{ error }}
        </div>
    {% endif %}

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-neon w-100 mb-4 text-center" style="max-width: 450px;">
            MSG_LOG: {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-card">
        <div class="text-center mb-4">
            <h2 class="glitch-header">AUTHENTICATE</h2>
            <p class="small text-white-50 mt-2" style="letter-spacing: 2px;">SECURE_CHANNEL_ACTIVE</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-4">
                <label class="form-label">Email Comms Link</label>
                <input type="email" name="email" class="form-control" placeholder="user@domain.com" required autocomplete="off">
            </div>
            
            <div class="mb-4">
                <label class="form-label">Access Protocol (Password)</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-plasma">INITIALIZE_LOGIN</button>
        </form>

        <div class="mt-4 text-center">
            <a href="{{ url_for('register') }}" class="back-link">NO IDENTITY? CREATE_NEW_CORE</a>
            <br>
            <a href="{{ url_for('home') }}" class="back-link mt-3 d-inline-block">← ABORT_TO_TERMINAL</a>
        </div>
    </div>
</div>

</body>
</html>
